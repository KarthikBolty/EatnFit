<!DOCTYPE html>
<html lang="en">
<head>
   {% load static %}
  <link rel="icon" href="{% static 'favicon.ico' %}">
  <title>EatnFit</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    body {
      background: radial-gradient(circle at center, #1c1c1c 0%, #111 100%);
      color: white;
      height: 100vh;
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .overlay {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      text-align: center;
      padding: 20px;
    }

    .quote-box {
      background-color: rgba(255, 69, 0, 0.08);
      color: orangered;
      padding: 12px 28px;
      margin-bottom: 40px;
      border-radius: 12px;
      font-style: italic;
      font-weight: 500;
    }

    h1 {
      font-size: 4rem;
      font-weight: 700;
      color: #fff;
      text-shadow: 1px 1px 5px #000;
    }

    h1 span {
      color: orangered;
    }

    .subtext {
      font-size: 1.5rem;
      margin-bottom: 40px;
      color: #ccc;
    }

    .btn-orange {
      background-color: orangered;
      color: white;
      font-weight: bold;
      font-size: 1.2rem;
      padding: 12px 30px;
      border-radius: 50px;
      text-transform: uppercase;
      border: none;
      transition: 0.3s ease;
    }

    .btn-orange:hover {
      background-color: #e63900;
    }

    .top-links {
      position: absolute;
      top: 20px;
      right: 20px;
    }

    .top-links a {
      color: orangered;
      font-weight: bold;
      margin-left: 12px;
      text-decoration: none;
    }

    .top-links a:hover {
      color: #ff4800;
      text-decoration: underline;
    }

  </style>
</head>
<body>

<!-- Login / Logout Buttons -->
<div class="top-links">
  {% if user.is_authenticated %}
    <a href="{% url 'dashboard' %}">Dashboard</a>
    <a href="{% url 'logout' %}">Logout</a>
  {% else %}
    <a href="{% url 'login' %}">Login</a>
    <a href="{% url 'register' %}">Register</a>
  {% endif %}
</div>

<div class="overlay">
  <div class="quote-box">
    "The body achieves what the mind believes."
  </div>

  <h1>Welcome to <span>EatnFit</span></h1>
  <div class="subtext">Fuel Your Fitness</div>

  <a href="{% url 'dashboard'%}" class="btn btn-orange">
    <i class="bi bi-arrow-right-circle"></i> Enter Dashboard
  </a>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
